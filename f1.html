<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberDrive F1 GLOBAL </title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --neon-red: #ff0000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        .game-container {
            position: relative;
            border: 2px solid var(--neon-red);
            box-shadow: 0 0 25px #600;
            background: #000;
            width: 95vw;
            max-width: 640px;
            aspect-ratio: 4/3;
        }

        canvas {
            display: block;
            background: #050000;
            width: 100%;
            height: 100%;
        }

        .hud {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: #f00;
            font-weight: bold;
            text-shadow: 0 0 8px red;
            pointer-events: none;
            z-index: 5;
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.96);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #f00;
            z-index: 10;
            padding: 20px;
            text-align: center;
        }

        .leaderboard {
            margin: 15px 0;
            width: 320px;
            border-collapse: collapse;
            font-size: 13px;
        }

        .leaderboard th {
            border-bottom: 1px solid #f00;
            padding: 8px;
            text-transform: uppercase;
            color: #fff;
        }

        .leaderboard td {
            padding: 6px;
            text-align: center;
        }

        .high-row {
            color: #fff;
            text-shadow: 0 0 10px #f00;
            font-weight: bold;
        }

        /* GÜNCELLENMİŞ SADE KONTROLLER */
        .controls {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            gap: 60px;
            /* Tuşlar arası mesafe */
            width: 100%;
        }

        .d-btn {
            width: 80px;
            height: 80px;
            border: 2px solid var(--neon-red);
            color: var(--neon-red);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            font-size: 2rem;
            background: rgba(255, 0, 0, 0.1);
            cursor: pointer;
        }

        .d-btn:active {
            background: var(--neon-red);
            color: #000;
            box-shadow: 0 0 20px var(--neon-red);
        }

        @media (min-width: 769px) {
            .controls {
                display: none !important;
            }
        }

        @media (max-width: 768px) {
            .controls {
                display: flex !important;
            }
        }

        #nick-input {
            background: #000;
            border: 1px solid red;
            color: #fff;
            padding: 10px;
            width: 200px;
            text-align: center;
            margin-bottom: 10px;
            outline: none;
        }

        button {
            background: transparent;
            border: 1px solid red;
            color: red;
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: inherit;
            transition: 0.3s;
        }

        button:hover {
            background: red;
            color: black;
        }
    </style>
</head>

<body>
    <div style="position:absolute;top:20px;left:20px"><a href="../index.html"
            style="color:#fff;text-decoration:none;border:1px solid red;padding:5px 10px;font-size:0.6rem">[ ESC ]
            EXIT</a></div>

    <div class="game-container">
        <div class="hud">
            <div>SKOR: <span id="currentScore">0</span></div>
            <div>HIZ: <span id="speed">0</span> KM/H</div>
        </div>
        <div id="overlay">
            <h1 id="msg">GLOBAL_LEADERBOARD</h1>
            <table class="leaderboard">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>AGENT_NICK</th>
                        <th>SCORE</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <tr>
                        <td colspan="3">GRID_LOADING...</td>
                    </tr>
                </tbody>
            </table>
            <div id="nick-section" style="display: none;">
                <p id="final-score-msg" style="margin: 5px 0;">SON SKORUN: 0</p>
                <input type="text" id="nick-input" placeholder="ENTER NICKNAME" maxlength="10">
                <button id="submit-btn" onclick="uploadScore()">DATA_UPLOAD</button>
            </div>
            <button id="start-btn" onclick="startGame()">DRIVE</button>
        </div>
        <canvas id="gameCanvas" width="640" height="480"></canvas>
    </div>

    <div class="controls">
        <div class="d-btn" id="l">◀</div>
        <div class="d-btn" id="r">▶</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: import.meta.env.VITE_FIREBASE_API_KEY,
            authDomain: import.meta.env.VITE_FIREBASE_AUTH_DOMAIN,
            databaseURL: import.meta.env.VITE_FIREBASE_DB_URL,
            projectId: import.meta.env.VITE_FIREBASE_PROJECT_ID,
            storageBucket: import.meta.env.VITE_FIREBASE_STORAGE_BUCKET,
            messagingSenderId: import.meta.env.VITE_FIREBASE_SENDER_ID,
            appId: import.meta.env.VITE_FIREBASE_APP_ID
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const scoreRef = db.ref('f1_high_scores');
        // 1. MEVCUT KODLARIN (Firebase config ve leaderboard listeleme burada kalsın)
        // ... senin attığın kodlar ...

        // 2. SKOR KAYDETME FONKSİYONU (Bunu bir yere ekle)
        function saveBestScore(userName, newScore) {
            const userScoreRef = db.ref('f1_high_scores/' + userName);

            userScoreRef.once('value').then((snapshot) => {
                const data = snapshot.val();
                if (!data || newScore > data.score) {
                    userScoreRef.set({
                        name: userName,
                        score: newScore
                    });
                }
            });
        }

        // 3. TETİKLEYİCİ (Oyunun bittiği yer neresiyse oraya koy)
        // Örnek:
        function gameFinished(finalScore) {
            let player = prompt("Nickname: "); // VEYA bir inputtan al
            if (player) {
                saveBestScore(player, finalScore); // İşte burası çalıştırıyor!
            }
        }

        scoreRef.orderByChild('score').limitToLast(10).on('value', (snapshot) => {
            const body = document.getElementById('leaderboardBody');
            body.innerHTML = "";
            let scores = [];
            snapshot.forEach(child => { scores.push(child.val()); });
            scores.reverse().forEach((data, index) => {
                body.innerHTML += `<tr class="${index === 0 ? 'high-row' : ''}"><td>${index + 1}</td><td style="color:#ff0">${data.name}</td><td>${data.score}</td></tr>`;
            });
        });

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const speedEl = document.getElementById('speed');
        const scoreEl = document.getElementById('currentScore');
        const overlay = document.getElementById('overlay');

        const width = 640, height = 480, roadW = 2000, segL = 200, camD = 0.8;
        let pos = 0, speed = 0, playerX = 0, score = 0, inGame = false, enemies = [];
        const keys = { ArrowLeft: false, ArrowRight: false };
        const laneCenters = [-0.75, -0.25, 0.25, 0.75];

        // SADECE SOL VE SAĞ BAĞLANTISI
        const bindBtn = (id, key) => {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('pointerdown', (e) => { e.preventDefault(); keys[key] = true; });
            el.addEventListener('pointerup', (e) => { e.preventDefault(); keys[key] = false; });
            el.addEventListener('pointerleave', (e) => { e.preventDefault(); keys[key] = false; });

        };
        bindBtn('l', 'ArrowLeft');
        bindBtn('r', 'ArrowRight');

        window.onkeydown = e => { if (e.code === "ArrowLeft" || e.code === "ArrowRight") keys[e.code] = true; };
        window.onkeyup = e => { if (e.code === "ArrowLeft" || e.code === "ArrowRight") keys[e.code] = false; };
        window.addEventListener('keydown', (e) => {
            if ([32, 37, 38, 39, 40].indexOf(e.keyCode) > -1) e.preventDefault();
            if (e.keyCode == 27) window.location.href = "../index.html";
            input(e);
        });

        function project(pX, pY, pZ) {
            let scale = camD / (pZ / segL);
            let x = (width / 2) + (pX / roadW - playerX) * scale * width * 1.2;
            let y = (height / 2) + (pY / 1000) * scale * (height / 2);
            return { x, y, w: scale * width * 1.2 };
        }

        function drawPlayer(x, y) {
            ctx.shadowBlur = 20; ctx.shadowColor = "#f00";
            ctx.fillStyle = "#ff0000"; ctx.fillRect(x - 12, y, 24, 60);
            ctx.fillStyle = "#800"; ctx.fillRect(x - 35, y + 45, 70, 8);
            ctx.fillStyle = "#600"; ctx.fillRect(x - 30, y - 5, 60, 10);
            ctx.fillStyle = "#111"; ctx.fillRect(x - 35, y + 35, 12, 18); ctx.fillRect(x + 23, y + 35, 12, 18);
            ctx.fillRect(x - 35, y + 5, 15, 22); ctx.fillRect(x + 20, y + 5, 15, 22);
            ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(x, y + 25, 6, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
        }

        function startGame() {
            inGame = true; pos = 0; speed = 40; playerX = 0; score = 0; enemies = [];
            overlay.style.display = 'none';
            scoreEl.innerText = "0";
            mainLoop();
        }

        function mainLoop() {
            if (!inGame) return;
            ctx.clearRect(0, 0, width, height);
            pos += speed;
            if (pos > 100000) { pos -= 100000; enemies.forEach(en => en.z -= 100000); }

            if (keys.ArrowLeft) playerX -= 0.045;
            if (keys.ArrowRight) playerX += 0.045;
            playerX = Math.max(-0.85, Math.min(0.85, playerX));

            for (let n = 0; n < 45; n++) {
                let z1 = (Math.floor(pos / segL) + n) * segL;
                let p1 = project(0, 1500, z1 - pos), p2 = project(0, 1500, z1 + segL - pos);
                if (p1.y <= height / 2) continue;
                ctx.fillStyle = (Math.floor(z1 / segL) % 2) ? "#0a0000" : "#000";
                ctx.beginPath(); ctx.moveTo(p1.x - p1.w, p1.y); ctx.lineTo(p1.x + p1.w, p1.y); ctx.lineTo(p2.x + p2.w, p2.y); ctx.lineTo(p2.x - p2.w, p2.y); ctx.fill();
                ctx.strokeStyle = (Math.floor(z1 / segL) % 2) ? "#400" : "transparent";
                for (let i = -0.5; i <= 0.5; i += 0.5) { ctx.beginPath(); ctx.moveTo(p1.x + i * p1.w, p1.y); ctx.lineTo(p2.x + i * p2.w, p2.y); ctx.stroke(); }
                ctx.strokeStyle = "#f00"; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(p1.x - p1.w, p1.y); ctx.lineTo(p2.x - p2.w, p2.y); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(p1.x + p1.w, p1.y); ctx.lineTo(p2.x + p2.w, p2.y); ctx.stroke();
            }

            if (Math.random() < 0.02 && enemies.length < 4) { enemies.push({ z: pos + 12000, x: laneCenters[Math.floor(Math.random() * 4)] }); }
            for (let i = enemies.length - 1; i >= 0; i--) {
                let en = enemies[i]; let relZ = en.z - pos;
                if (relZ <= 0) { enemies.splice(i, 1); score += 10; scoreEl.innerText = score; continue; }
                let p = project(en.x * roadW, 1500, relZ);
                if (p.y > height / 2 && p.y < height) {
                    let size = p.w * 0.12; ctx.fillStyle = "#f00"; ctx.shadowBlur = 15; ctx.shadowColor = "red";
                    ctx.fillRect(p.x - size / 2, p.y - size, size, size); ctx.shadowBlur = 0;
                    if (relZ < 550 && relZ > 100 && Math.abs(en.x - playerX) < 0.28) { gameOver(); }
                }
            }
            drawPlayer(width / 2, 380);
            if (speed < 130) speed += 0.02;
            speedEl.innerText = Math.floor(speed);
            requestAnimationFrame(mainLoop);
        }

        function gameOver() {
            inGame = false;
            overlay.style.display = 'flex';
            document.getElementById('msg').innerText = "CRITICAL_FAILURE";
            document.getElementById('final-score-msg').innerText = "YOUR SCORE: " + score;
            document.getElementById('nick-section').style.display = 'block';
            document.getElementById('start-btn').style.display = 'none';
        }

        function uploadScore() {
            const nickInput = document.getElementById('nick-input');
            const nick = nickInput.value.trim().toUpperCase() || "ANONYMOUS";
            const cleanNick = nick.replace(/[.#$[\]]/g, "");
            const submitBtn = document.getElementById('submit-btn');


            submitBtn.disabled = true;
            submitBtn.innerText = "CHECKING...";

            const userRef = scoreRef.child(cleanNick);


            userRef.once('value').then((snapshot) => {
                const existingData = snapshot.val();


                if (!existingData || score > existingData.score) {
                    userRef.set({
                        name: nick,
                        score: score,
                        ts: Date.now()
                    }).then(() => {

                        location.reload();
                    });
                } else {

                    location.reload();
                }
            }).catch((err) => {
                console.error("Hata:", err);
                submitBtn.disabled = false;
                submitBtn.innerText = "ERROR!";
            });
        }
    </script>
</body>

</html>
